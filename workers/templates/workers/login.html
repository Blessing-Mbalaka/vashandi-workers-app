<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vashandi - Login</title>
    <style>
        :root {
            --bg: #fcfaf4;
            --bg-soft: #f3ecdc;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-strong: #ffffff;
            --surface: #f7f1e4;
            --surface-2: #efe5d0;
            --text: #17130d;
            --muted: #726553;
            --border: rgba(180, 136, 17, 0.18);
            --border-strong: #c7961a;
            --gold: #c7961a;
            --gold-deep: #9c7310;
            --danger: #c54848;
            --success: #2f8a5e;
            --shadow: 0 28px 70px rgba(72, 52, 22, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(199, 150, 26, 0.14), transparent 26%),
                radial-gradient(circle at bottom right, rgba(199, 150, 26, 0.1), transparent 24%),
                linear-gradient(180deg, var(--bg) 0%, #fffdf8 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            pointer-events: none;
            z-index: 0;
            filter: blur(2px);
        }

        body::before {
            width: 280px;
            height: 280px;
            top: -70px;
            right: -70px;
            background: rgba(199, 150, 26, 0.08);
        }

        body::after {
            width: 220px;
            height: 220px;
            bottom: -80px;
            left: -40px;
            background: rgba(114, 101, 83, 0.08);
        }

        .login-container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            position: relative;
            overflow: hidden;
            padding: 40px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(199, 150, 26, 0.08), transparent 24%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4), transparent 44%);
        }

        .brand {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .brand-mark {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--gold), var(--gold-deep));
            color: #ffffff;
            box-shadow: 0 14px 26px rgba(199, 150, 26, 0.2);
        }

        .brand-mark svg {
            width: 26px;
            height: 26px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .subtitle {
            position: relative;
            text-align: center;
            color: var(--muted);
            margin-bottom: 30px;
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-tabs {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 28px;
            padding: 6px;
            background: rgba(243, 236, 220, 0.95);
            border-radius: 18px;
        }

        .tab-btn {
            padding: 14px 16px;
            border: 0;
            background: transparent;
            color: var(--muted);
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: background 0.22s ease, color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
        }

        .tab-btn:hover,
        .tab-btn:focus-visible {
            color: var(--text);
            outline: none;
        }

        .tab-btn.active {
            background: var(--panel-strong);
            color: var(--text);
            box-shadow: 0 8px 18px rgba(80, 58, 26, 0.1);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.28s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            position: relative;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.79rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.94);
            color: var(--text);
            border-radius: 16px;
            font-size: 1rem;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .form-group input::placeholder {
            color: #9a8a73;
        }

        .form-group select,
        .form-group select option {
            color: var(--text);
            background: #ffffff;
        }

        .form-group input:hover,
        .form-group select:hover {
            border-color: rgba(199, 150, 26, 0.32);
            background: #ffffff;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--border-strong);
            box-shadow: 0 0 0 4px rgba(199, 150, 26, 0.14);
            background: #ffffff;
            transform: translateY(-1px);
        }

        .form-group input:-webkit-autofill,
        .form-group select:-webkit-autofill {
            -webkit-text-fill-color: var(--text);
            -webkit-box-shadow: 0 0 0 1000px #ffffff inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-help {
            margin-top: 8px;
            color: #8a7961;
            font-size: 0.84rem;
            line-height: 1.5;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .company-fields {
            display: none;
        }

        .company-fields.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(145deg, var(--gold), var(--gold-deep));
            color: var(--text);
            font-weight: 800;
            font-size: 0.94rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
            box-shadow: 0 16px 32px rgba(199, 150, 26, 0.24);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .submit-btn:hover,
        .submit-btn:focus-visible {
            transform: translateY(-1px);
            filter: brightness(1.02);
            outline: none;
            box-shadow: 0 18px 38px rgba(199, 150, 26, 0.3);
        }

        .error-message,
        .success-message {
            display: none;
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .error-message {
            color: var(--danger);
            background: rgba(197, 72, 72, 0.08);
            border: 1px solid rgba(197, 72, 72, 0.18);
        }

        .success-message {
            color: var(--success);
            background: rgba(47, 138, 94, 0.08);
            border: 1px solid rgba(47, 138, 94, 0.18);
        }

        .error-message.show,
        .success-message.show {
            display: block;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 560px) {
            .login-card {
                padding: 28px 22px;
                border-radius: 24px;
            }

            .brand {
                flex-direction: column;
                gap: 12px;
            }

            .logo {
                font-size: 2rem;
            }

            .name-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 5l5 5"></path>
                        <path d="M11 8l6 6"></path>
                        <path d="M7 12l5 5"></path>
                        <path d="M3 21l6-2 12-12-4-4L5 15l-2 6z"></path>
                    </svg>
                </div>
                <div class="logo">Vashandi</div>
            </div>
            <p class="subtitle">A refined workspace for finding trusted skilled workers and managing service requests with ease.</p>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="form-tabs">
                <button type="button" class="tab-btn active" onclick="switchTab('login', this)">Login</button>
                <button type="button" class="tab-btn" onclick="switchTab('register', this)">Register</button>
            </div>

            <div class="form-container">
                <div class="form-section active" id="loginForm">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" required placeholder="Enter your username">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="submit-btn">Login</button>
                    </form>
                </div>

                <div class="form-section" id="registerForm">
                    <form onsubmit="handleRegister(event)">
                        <div class="name-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" name="first_name" required placeholder="First name">
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" name="last_name" required placeholder="Last name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" required placeholder="Choose a username">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" required minlength="8" placeholder="Minimum 8 characters">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" name="password2" required minlength="8" placeholder="Re-enter password">
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select name="current_role" required>
                                <option value="client">Client - Looking for services</option>
                                <option value="provider">Service Provider - Offering services</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Account Type</label>
                            <select name="account_type" id="accountTypeSelect" required onchange="toggleCompanyFields(this.value)">
                                <option value="individual">Individual</option>
                                <option value="company">Company</option>
                            </select>
                        </div>
                        <div class="company-fields" id="companyFields">
                            <div class="form-group">
                                <label>Company Name</label>
                                <input type="text" name="company_name" id="companyNameInput" placeholder="Registered company name">
                            </div>
                            <div class="form-group">
                                <label>Company Website (Optional)</label>
                                <input type="url" name="company_website" placeholder="https://example.com">
                            </div>
                            <div class="form-group">
                                <label>VAT Number (Optional)</label>
                                <input type="text" name="vat_number" placeholder="VAT / Tax reference">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <select name="country" id="registerCountrySelect" required>
                                <option value="">Select your country</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" name="location" placeholder="City or town">
                        </div>
                        <div class="form-group">
                            <label>Phone (Optional)</label>
                            <input type="tel" name="phone" placeholder="Your phone number">
                        </div>
                        <div class="form-group">
                            <label id="verificationDocumentLabel">Verification Document</label>
                            <input type="file" name="verification_document" id="verificationDocumentInput" required accept=".pdf,.jpg,.jpeg,.png,.webp">
                            <p class="form-help" id="verificationDocumentHelp">Upload the correct verification file for your account type. Your account will stay pending until an admin reviews and approves it.</p>
                        </div>
                        <button type="submit" class="submit-btn">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function switchTab(tab, button) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            button.classList.add('active');

            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(tab + 'Form').classList.add('active');

            hideMessages();
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function toggleCompanyFields(value) {
            const container = document.getElementById('companyFields');
            const companyNameInput = document.getElementById('companyNameInput');
            const verificationDocumentLabel = document.getElementById('verificationDocumentLabel');
            const verificationDocumentHelp = document.getElementById('verificationDocumentHelp');
            const isCompany = value === 'company';
            container.classList.toggle('show', isCompany);
            companyNameInput.required = isCompany;
            verificationDocumentLabel.textContent = isCompany ? 'Company Verification Documents' : 'Certified ID Document';
            verificationDocumentHelp.textContent = isCompany
                ? 'Upload merged company documents as one file, such as registration papers, tax clearance, or other company compliance records. Your account will stay pending until an admin reviews and approves the file.'
                : 'This upload is required. Your account will stay pending until an admin reviews and approves your certified ID document.';
            if (!isCompany) {
                companyNameInput.value = '';
            }
        }

        async function loadCountries() {
            try {
                const response = await fetch('/api/countries/');
                const rawData = await response.json();
                const countries = Array.isArray(rawData) ? rawData : (rawData.results || []);
                const select = document.getElementById('registerCountrySelect');
                select.innerHTML = '<option value="">Select your country</option>' + countries.map(country => `
                    <option value="${country.id}">${country.name} (${country.currency_code})</option>
                `).join('');
            } catch (error) {
                console.error('Failed to load countries', error);
            }
        }

        function populateLoginAfterRegister(username) {
            const loginUsername = document.querySelector('#loginForm input[name="username"]');
            const loginPassword = document.querySelector('#loginForm input[name="password"]');
            if (loginUsername) {
                loginUsername.value = username || '';
                loginUsername.focus();
            }
            if (loginPassword) {
                loginPassword.value = '';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();

            const formData = new FormData(event.target);
            const data = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess('Login successful. Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError(result.error || 'Login failed. Please try again.');
                }
            } catch (error) {
                showError('An error occurred. Please try again.');
                console.error('Error:', error);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();

            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            if (data.password !== data.password2) {
                showError('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    switchTab('login', document.querySelector('.tab-btn'));
                    populateLoginAfterRegister(data.username);
                    showSuccess(result.message || 'Registration successful. Please log in.');
                } else {
                    const errors = Object.values(result).flat().join(' ');
                    showError(errors || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showError('An error occurred. Please try again.');
                console.error('Error:', error);
            }
        }

        loadCountries();
        toggleCompanyFields(document.getElementById('accountTypeSelect').value);
    </script>
</body>
</html>
