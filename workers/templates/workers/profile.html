{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | Vashandi</title>
    <style>
        :root {
            --bg: #fcfaf4;
            --panel: rgba(255, 255, 255, 0.92);
            --surface: #f7f1e4;
            --surface-hover: #f1e7d6;
            --text: #17130d;
            --muted: #746754;
            --line: rgba(199, 150, 26, 0.18);
            --gold: #c7961a;
            --gold-deep: #9c7310;
            --success: #2f8a5e;
            --danger: #c54848;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(199, 150, 26, 0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(116, 103, 84, 0.08), transparent 24%),
                linear-gradient(180deg, #fffef9 0%, var(--bg) 100%);
        }

        .container {
            max-width: 880px;
            margin: 40px auto;
            padding: 36px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(72, 52, 22, 0.12);
            backdrop-filter: blur(14px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .back-link:hover,
        .back-link:focus-visible {
            color: var(--text);
            outline: none;
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2.2rem;
            letter-spacing: 0.02em;
        }

        .intro {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.7;
            max-width: 620px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            color: var(--text);
            font: 1rem "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        input:hover,
        textarea:hover {
            background: #ffffff;
            border-color: rgba(199, 150, 26, 0.28);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(199, 150, 26, 0.14);
            background: #ffffff;
            transform: translateY(-1px);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 14px 22px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-1px);
            outline: none;
        }

        .btn-primary {
            border: none;
            background: linear-gradient(145deg, var(--gold), var(--gold-deep));
            color: #ffffff;
            box-shadow: 0 16px 32px rgba(199, 150, 26, 0.24);
        }

        .btn-secondary {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
        }

        .btn-secondary:hover,
        .btn-secondary:focus-visible {
            background: var(--surface-hover);
            border-color: var(--gold);
        }

        .status {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            display: none;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        @media (max-width: 640px) {
            .container {
                margin: 20px;
                padding: 26px 22px;
                border-radius: 24px;
            }

            .actions {
                flex-direction: column-reverse;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'dashboard' %}" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6"></path>
            </svg>
            Back to Dashboard
        </a>
        <h1>{{ user.get_full_name }}</h1>
        <p class="intro">Refine your public profile so clients can quickly understand your skills, contact details, and working style.</p>
        <form id="profileForm">
            <div class="form-grid">
                <div>
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="first_name" value="{{ user.first_name }}">
                </div>
                <div>
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="last_name" value="{{ user.last_name }}">
                </div>
                <div>
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" value="{{ user.phone }}">
                </div>
                <div>
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" value="{{ user.location }}">
                </div>
            </div>
            <div style="margin-top: 18px;">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio">{{ user.bio }}</textarea>
            </div>
            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="window.location='{% url 'dashboard' %}'">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
            <div class="status" id="statusMessage"></div>
        </form>
    </div>
    <script>
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return decodeURIComponent(match[2]);
            return null;
        }

        document.getElementById('profileForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const payload = {};
            formData.forEach((value, key) => payload[key] = value);
            try {
                const response = await fetch('/api/user/', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const status = document.getElementById('statusMessage');
                status.style.display = 'block';
                if (response.ok) {
                    status.style.color = 'var(--success)';
                    status.style.background = 'rgba(47, 138, 94, 0.08)';
                    status.style.border = '1px solid rgba(47, 138, 94, 0.18)';
                    status.textContent = 'Profile updated successfully.';
                } else {
                    status.style.color = 'var(--danger)';
                    status.style.background = 'rgba(197, 72, 72, 0.08)';
                    status.style.border = '1px solid rgba(197, 72, 72, 0.18)';
                    status.textContent = data.error || 'Failed to update profile.';
                }
            } catch (error) {
                alert('Unable to update profile. Please try again.');
            }
        });
    </script>
</body>
</html>
